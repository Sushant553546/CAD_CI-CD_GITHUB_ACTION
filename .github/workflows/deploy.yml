name: Deploy FastAPI to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Deploy and Rebuild Containers
        run: |
          cd ~/CAD_CI-CD_GITHUB_ACTION
          git pull origin main
          docker compose down
          docker compose up -d --build
          docker image prune -f

